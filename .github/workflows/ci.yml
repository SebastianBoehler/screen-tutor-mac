name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Select minimum supported Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Install XcodeGen
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: brew install xcodegen

      - name: Regenerate Xcode project
        run: xcodegen generate

      - name: Check generated project is current
        run: git diff --exit-code -- ScreenTutor.xcodeproj

      - name: Build and run tests
        run: >-
          xcodebuild
          -project ScreenTutor.xcodeproj
          -scheme ScreenTutor
          -destination 'platform=macOS,arch=arm64'
          CODE_SIGNING_ALLOWED=NO
          test
