name: Bug report
description: Report reproducible incorrect behavior in ScreenTutor
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Remove API keys, voice data, screenshots, and personal information before submitting. Use the Security tab for vulnerabilities.
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the observed behavior and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ...
        2. Start ...
        3. Observe ...
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: macOS 15.5
    validations:
      required: true
  - type: input
    id: revision
    attributes:
      label: ScreenTutor version or commit
      placeholder: Commit SHA or branch name
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add sanitized logs or other context. Do not include sensitive screen content.
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for duplicates.
          required: true
        - label: This report contains no API key or private screen or voice data.
          required: true
