name: Feature request
description: Propose a focused improvement grounded in a user need
title: "[Feature]: "
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or learning need
      description: What is difficult today, and who encounters it?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the smallest useful interaction, not only an implementation.
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Privacy and safety implications
      description: Explain any effect on capture scope, voice data, credentials, or computer control.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or smaller options have you tried?
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for related requests.
          required: true
